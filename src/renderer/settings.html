<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Settings</title>
  <style>
    :root {
      --text-primary: #1c1c1e;
      --text-secondary: rgba(0, 0, 0, 0.45);
      --divider: rgba(0, 0, 0, 0.08);
      --input-bg: rgba(255, 255, 255, 0.55);
      --input-bg-focus: rgba(255, 255, 255, 0.78);
      --input-border: rgba(0, 0, 0, 0.1);
      --input-border-focus: rgba(0, 122, 255, 0.55);
      --input-ring: rgba(0, 122, 255, 0.14);
      --placeholder: rgba(0, 0, 0, 0.28);
      --btn-dismiss-bg: rgba(0, 0, 0, 0.07);
      --btn-dismiss-hover: rgba(0, 0, 0, 0.12);
      --btn-dismiss-text: rgba(0, 0, 0, 0.55);
      --track-off: rgba(0, 0, 0, 0.15);
      --drag-bar: rgba(0, 0, 0, 0.18);
      --reveal-color: rgba(0, 0, 0, 0.35);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --text-primary: rgba(255, 255, 255, 0.92);
        --text-secondary: rgba(255, 255, 255, 0.5);
        --divider: rgba(255, 255, 255, 0.08);
        --input-bg: rgba(255, 255, 255, 0.08);
        --input-bg-focus: rgba(255, 255, 255, 0.12);
        --input-border: rgba(255, 255, 255, 0.1);
        --input-border-focus: rgba(10, 132, 255, 0.7);
        --input-ring: rgba(10, 132, 255, 0.18);
        --placeholder: rgba(255, 255, 255, 0.25);
        --btn-dismiss-bg: rgba(255, 255, 255, 0.08);
        --btn-dismiss-hover: rgba(255, 255, 255, 0.14);
        --btn-dismiss-text: rgba(255, 255, 255, 0.55);
        --track-off: rgba(255, 255, 255, 0.18);
        --drag-bar: rgba(255, 255, 255, 0.18);
        --reveal-color: rgba(255, 255, 255, 0.4);
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 20px 22px 18px;
      color: var(--text-primary);
      -webkit-app-region: drag;
      overflow: hidden;
    }

    .drag-bar {
      height: 4px;
      width: 36px;
      background: var(--drag-bar);
      border-radius: 4px;
      margin: 0 auto 16px;
      flex-shrink: 0;
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 16px;
      flex-shrink: 0;
    }

    .title-row .icon { width: 20px; height: 20px; object-fit: contain; }
    .title-row h1 { font-size: 14px; font-weight: 600; letter-spacing: -0.2px; }

    .section { display: flex; flex-direction: column; gap: 0; flex: 1; }

    /* Toggle row */
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 0;
      border-bottom: 1px solid var(--divider);
      -webkit-app-region: no-drag;
    }

    .row-label { font-size: 13px; font-weight: 500; }
    .row-sub   { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

    /* Input rows */
    .input-row {
      padding: 11px 0;
      border-bottom: 1px solid var(--divider);
      -webkit-app-region: no-drag;
    }

    .input-row label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrap input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 12px;
      padding: 7px 10px;
      outline: none;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
    }

    .input-wrap input::placeholder { color: var(--placeholder); }

    .input-wrap input:focus {
      border-color: var(--input-border-focus);
      background: var(--input-bg-focus);
      box-shadow: 0 0 0 3px var(--input-ring);
    }

    .input-wrap input.has-reveal { padding-right: 32px; }

    .btn-reveal {
      position: absolute;
      right: 8px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 12px;
      color: var(--reveal-color);
      padding: 2px 4px;
      border-radius: 4px;
    }

    .btn-reveal:hover { color: var(--text-primary); }

    /* Toggle */
    .toggle { position: relative; width: 42px; height: 24px; flex-shrink: 0; cursor: pointer; }
    .toggle input { display: none; }
    .track { position: absolute; inset: 0; border-radius: 12px; background: var(--track-off); transition: background 0.2s; }
    .toggle input:checked + .track { background: #34C759; }
    .thumb { position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; border-radius: 50%; background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.25); transition: transform 0.2s; }
    .toggle input:checked ~ .thumb { transform: translateX(18px); }

    .btn-github-connect {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--btn-dismiss-bg);
      color: var(--text-primary);
      border: 1px solid var(--input-border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 12.5px;
      font-weight: 500;
      padding: 7px 14px;
      cursor: pointer;
      transition: background 0.1s;
      -webkit-app-region: no-drag;
      width: 100%;
      justify-content: center;
    }
    .btn-github-connect:hover { background: var(--btn-dismiss-hover); }

    .github-code-label {
      font-size: 11.5px;
      color: var(--text-secondary);
      margin-bottom: 7px;
    }

    .github-code {
      font-family: -apple-system-ui-monospace, 'SF Mono', monospace;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 10%, transparent);
      border-radius: 8px;
      padding: 8px 14px;
      display: inline-block;
    }

    .github-connected-row {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 4px 0;
    }

    .btn-test-github {
      flex-shrink: 0;
      background: var(--btn-dismiss-bg);
      color: var(--btn-dismiss-text);
      border: none;
      border-radius: 6px;
      font-family: inherit;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 9px;
      cursor: pointer;
      transition: background 0.1s;
      -webkit-app-region: no-drag;
    }
    .btn-test-github:hover { background: var(--btn-dismiss-hover); }
    .btn-test-github:disabled { opacity: 0.5; cursor: default; }

    .github-status {
      margin-top: 7px;
      font-size: 11px;
      color: var(--text-secondary);
      white-space: pre-wrap;
      line-height: 1.5;
      display: none;
    }
    .github-status.visible { display: block; }
    .github-status.ok   { color: #34C759; }
    .github-status.warn { color: #FF9500; }
    .github-status.err  { color: #FF3B30; }

    .footer {
      margin-top: 14px;
      flex-shrink: 0;
      display: flex;
      gap: 8px;
      -webkit-app-region: no-drag;
    }

    button.btn-save {
      flex: 1;
      padding: 8px;
      border-radius: 8px;
      border: none;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      background: #007AFF;
      color: #fff;
      transition: filter 0.1s;
    }

    @media (prefers-color-scheme: dark) { button.btn-save { background: #0A84FF; } }
    button.btn-save:hover { filter: brightness(1.1); }
    button.btn-save:active { filter: brightness(0.9); }
  </style>
</head>
<body>
  <div class="drag-bar"></div>

  <div class="title-row">
    <img class="icon" src="../assets/icon.png" alt="icon" />
    <h1>Settings</h1>
  </div>

  <div class="section">

    <div class="input-row">
      <label for="api-key">OpenRouter API Key</label>
      <div class="input-wrap">
        <input type="password" id="api-key" class="has-reveal" placeholder="sk-or-..." autocomplete="off" spellcheck="false" />
        <button class="btn-reveal" id="toggle-reveal" tabindex="-1">Show</button>
      </div>
    </div>

    <div class="input-row">
      <label for="model">Model</label>
      <div class="input-wrap">
        <input type="text" id="model" placeholder="openai/gpt-4o-mini" spellcheck="false" />
      </div>
    </div>

    <div class="input-row" id="github-section">
      <label>GitHub</label>

      <!-- Not connected state -->
      <div id="github-disconnected">
        <button class="btn-github-connect" id="github-connect">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
          Connect with GitHub
        </button>
        <div class="row-sub" style="margin-top:5px">Authorizes read access to your repos, PRs, and commits</div>
      </div>

      <!-- Waiting for user to authorize -->
      <div id="github-waiting" style="display:none">
        <div class="github-code-label">Enter this code at <strong>github.com/login/device</strong></div>
        <div class="github-code" id="github-user-code"></div>
        <div class="row-sub" style="margin-top:4px">Browser opened · waiting for authorization...</div>
        <button class="btn-test-github" id="github-cancel" style="margin-top:8px">Cancel</button>
      </div>

      <!-- Connected state -->
      <div id="github-connected-state" style="display:none">
        <div class="github-connected-row">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" style="color:var(--accent)"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
          <span id="github-username-display" class="row-label" style="font-size:12px"></span>
          <span style="color:#34C759;font-size:11px;font-weight:600">✓ Connected</span>
          <button class="btn-test-github" id="github-disconnect" style="margin-left:auto">Disconnect</button>
        </div>
      </div>

      <div class="github-status" id="github-status"></div>
    </div>

    <div class="row">
      <div>
        <div class="row-label">Quick Note Shortcut</div>
        <div class="row-sub">⌘⇧N — open a check-in from anywhere</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="shortcut-toggle" />
        <div class="track"></div>
        <div class="thumb"></div>
      </label>
    </div>

  </div>

  <div class="footer">
    <button class="btn-save" id="save">Save</button>
  </div>

  <script src="settings-renderer.js"></script>
</body>
</html>
