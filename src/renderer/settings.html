<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Settings</title>
  <style>
    :root {
      --text-primary: #1c1c1e;
      --text-secondary: rgba(0, 0, 0, 0.45);
      --divider: rgba(0, 0, 0, 0.08);
      --input-bg: rgba(255, 255, 255, 0.55);
      --input-bg-focus: rgba(255, 255, 255, 0.78);
      --input-border: rgba(0, 0, 0, 0.1);
      --input-border-focus: rgba(0, 122, 255, 0.55);
      --input-ring: rgba(0, 122, 255, 0.14);
      --placeholder: rgba(0, 0, 0, 0.28);
      --btn-dismiss-bg: rgba(0, 0, 0, 0.07);
      --btn-dismiss-hover: rgba(0, 0, 0, 0.12);
      --btn-dismiss-text: rgba(0, 0, 0, 0.55);
      --track-off: rgba(0, 0, 0, 0.15);
      --drag-bar: rgba(0, 0, 0, 0.18);
      --reveal-color: rgba(0, 0, 0, 0.35);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --text-primary: rgba(255, 255, 255, 0.92);
        --text-secondary: rgba(255, 255, 255, 0.5);
        --divider: rgba(255, 255, 255, 0.08);
        --input-bg: rgba(255, 255, 255, 0.08);
        --input-bg-focus: rgba(255, 255, 255, 0.12);
        --input-border: rgba(255, 255, 255, 0.1);
        --input-border-focus: rgba(10, 132, 255, 0.7);
        --input-ring: rgba(10, 132, 255, 0.18);
        --placeholder: rgba(255, 255, 255, 0.25);
        --btn-dismiss-bg: rgba(255, 255, 255, 0.08);
        --btn-dismiss-hover: rgba(255, 255, 255, 0.14);
        --btn-dismiss-text: rgba(255, 255, 255, 0.55);
        --track-off: rgba(255, 255, 255, 0.18);
        --drag-bar: rgba(255, 255, 255, 0.18);
        --reveal-color: rgba(255, 255, 255, 0.4);
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 20px 22px 18px;
      color: var(--text-primary);
      -webkit-app-region: drag;
      overflow: hidden;
    }

    .drag-bar {
      height: 4px;
      width: 36px;
      background: var(--drag-bar);
      border-radius: 4px;
      margin: 0 auto 16px;
      flex-shrink: 0;
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 16px;
      flex-shrink: 0;
    }

    .title-row .icon { width: 20px; height: 20px; object-fit: contain; }
    .title-row h1 { font-size: 14px; font-weight: 600; letter-spacing: -0.2px; }

    .section { display: flex; flex-direction: column; gap: 0; flex: 1; }

    /* Toggle row */
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 0;
      border-bottom: 1px solid var(--divider);
      -webkit-app-region: no-drag;
    }

    .row-label { font-size: 13px; font-weight: 500; }
    .row-sub   { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

    /* Input rows */
    .input-row {
      padding: 11px 0;
      border-bottom: 1px solid var(--divider);
      -webkit-app-region: no-drag;
    }

    .input-row label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrap input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 12px;
      padding: 7px 10px;
      outline: none;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
    }

    .input-wrap input::placeholder { color: var(--placeholder); }

    .input-wrap input:focus {
      border-color: var(--input-border-focus);
      background: var(--input-bg-focus);
      box-shadow: 0 0 0 3px var(--input-ring);
    }

    .input-wrap input.has-reveal { padding-right: 32px; }

    .btn-reveal {
      position: absolute;
      right: 8px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 12px;
      color: var(--reveal-color);
      padding: 2px 4px;
      border-radius: 4px;
    }

    .btn-reveal:hover { color: var(--text-primary); }

    /* Toggle */
    .toggle { position: relative; width: 42px; height: 24px; flex-shrink: 0; cursor: pointer; }
    .toggle input { display: none; }
    .track { position: absolute; inset: 0; border-radius: 12px; background: var(--track-off); transition: background 0.2s; }
    .toggle input:checked + .track { background: #34C759; }
    .thumb { position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; border-radius: 50%; background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.25); transition: transform 0.2s; }
    .toggle input:checked ~ .thumb { transform: translateX(18px); }

    .footer {
      margin-top: 14px;
      flex-shrink: 0;
      display: flex;
      gap: 8px;
      -webkit-app-region: no-drag;
    }

    button.btn-save {
      flex: 1;
      padding: 8px;
      border-radius: 8px;
      border: none;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      background: #007AFF;
      color: #fff;
      transition: filter 0.1s;
    }

    @media (prefers-color-scheme: dark) { button.btn-save { background: #0A84FF; } }
    button.btn-save:hover { filter: brightness(1.1); }
    button.btn-save:active { filter: brightness(0.9); }
  </style>
</head>
<body>
  <div class="drag-bar"></div>

  <div class="title-row">
    <img class="icon" src="../assets/icon.png" alt="icon" />
    <h1>Settings</h1>
  </div>

  <div class="section">

    <div class="input-row">
      <label for="api-key">OpenRouter API Key</label>
      <div class="input-wrap">
        <input type="password" id="api-key" class="has-reveal" placeholder="sk-or-..." autocomplete="off" spellcheck="false" />
        <button class="btn-reveal" id="toggle-reveal" tabindex="-1">Show</button>
      </div>
    </div>

    <div class="input-row">
      <label for="model">Model</label>
      <div class="input-wrap">
        <input type="text" id="model" placeholder="openai/gpt-4o-mini" spellcheck="false" />
      </div>
    </div>

    <div class="row">
      <div>
        <div class="row-label">Quick Note Shortcut</div>
        <div class="row-sub">⌘⇧N — open a check-in from anywhere</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="shortcut-toggle" />
        <div class="track"></div>
        <div class="thumb"></div>
      </label>
    </div>

  </div>

  <div class="footer">
    <button class="btn-save" id="save">Save</button>
  </div>

  <script src="settings-renderer.js"></script>
</body>
</html>
