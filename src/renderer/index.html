<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What Did You Do?</title>
  <style>
    :root {
      --text-primary:    rgba(0, 0, 0, 0.85);
      --text-secondary:  rgba(0, 0, 0, 0.40);
      --text-hint:       rgba(0, 0, 0, 0.22);
      --input-bg:        rgba(0, 0, 0, 0.04);
      --input-bg-focus:  rgba(0, 0, 0, 0.06);
      --input-border:    rgba(0, 0, 0, 0.12);
      --separator:       rgba(0, 0, 0, 0.08);
      --btn-secondary:   rgba(0, 0, 0, 0.06);
      --btn-secondary-hover: rgba(0, 0, 0, 0.10);
      --btn-secondary-text: rgba(0, 0, 0, 0.55);
      --accent:          #007AFF;
      --drag-handle:     rgba(0, 0, 0, 0.12);
      --popup-bg:        rgba(246, 246, 248, 0.98);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --text-primary:    rgba(255, 255, 255, 0.88);
        --text-secondary:  rgba(255, 255, 255, 0.42);
        --text-hint:       rgba(255, 255, 255, 0.20);
        --input-bg:        rgba(255, 255, 255, 0.06);
        --input-bg-focus:  rgba(255, 255, 255, 0.09);
        --input-border:    rgba(255, 255, 255, 0.10);
        --separator:       rgba(255, 255, 255, 0.08);
        --btn-secondary:   rgba(255, 255, 255, 0.07);
        --btn-secondary-hover: rgba(255, 255, 255, 0.12);
        --btn-secondary-text: rgba(255, 255, 255, 0.50);
        --accent:          #0A84FF;
        --drag-handle:     rgba(255, 255, 255, 0.15);
        --popup-bg:        rgba(30, 30, 32, 0.98);
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: transparent;
      -webkit-font-smoothing: antialiased;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-app-region: drag;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 18px 10px;
      padding-top: 44px; /* clear the native traffic light buttons */
      flex-shrink: 0;
    }

    .header img {
      width: 36px;
      height: 36px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .header-text {
      flex: 1;
      min-width: 0;
    }

    .header-text h1 {
      font-size: 13px;
      font-weight: 590;
      letter-spacing: -0.1px;
      line-height: 1.35;
      color: var(--text-primary);
    }

    .header-text .subtitle {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 1px;
      font-weight: 400;
    }

    .btn-settings {
      -webkit-app-region: no-drag;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      flex-shrink: 0;
      align-self: flex-start;
      transition: color 0.15s, background 0.15s;
      color: var(--text-secondary);
    }

    .btn-settings-icon {
      font-size: 14px;
      line-height: 1;
      display: block;
    }

    .btn-settings:hover {
      opacity: 0.7;
      background: var(--btn-secondary);
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--separator);
      margin: 0 18px;
      flex-shrink: 0;
    }

    /* ── Command chip (ask mode indicator) ── */
    .cmd-chip-row {
      display: none;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      -webkit-app-region: no-drag;
    }

    .cmd-chip-row.visible { display: flex; }

    .cmd-chip {
      display: inline-flex;
      align-items: center;
      background: color-mix(in srgb, var(--accent) 14%, transparent);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 6px;
      letter-spacing: -0.1px;
      font-family: -apple-system-ui-monospace, 'SF Mono', monospace;
    }

    .cmd-chip-label {
      font-size: 11px;
      color: var(--text-secondary);
      font-weight: 400;
    }

    .cmd-chip-x {
      -webkit-app-region: no-drag;
      background: none;
      border: none;
      color: var(--text-hint);
      cursor: pointer;
      font-size: 15px;
      line-height: 1;
      padding: 1px 5px;
      border-radius: 4px;
      font-weight: 300;
      letter-spacing: 0;
      margin-left: auto;
      transition: color 0.1s, background 0.1s;
    }

    .cmd-chip-x:hover { color: var(--text-secondary); background: var(--btn-secondary); }

    /* ── Sigil picker ── */
    .sigil-menu {
      display: none;
      position: absolute;
      top: 10px;
      left: 18px;
      right: 18px;
      background: var(--popup-bg);
      border: 1px solid var(--input-border);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.18);
      z-index: 100;
      -webkit-app-region: no-drag;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .sigil-menu.visible { display: block; }

    .sigil-header {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-hint);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      padding: 9px 12px 4px;
    }

    .sigil-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px 10px;
      cursor: pointer;
      transition: background 0.1s;
    }

    .sigil-item:hover { background: var(--input-bg); }

    .sigil-name {
      font-weight: 700;
      color: var(--accent);
      font-size: 13px;
      font-family: -apple-system-ui-monospace, 'SF Mono', monospace;
      min-width: 52px;
    }

    .sigil-desc {
      font-size: 12px;
      color: var(--text-secondary);
    }

    /* ── Textarea ── */
    .input-wrap {
      flex: 1;
      padding: 10px 18px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      position: relative;
      min-height: 0;
    }

    textarea {
      flex: 1 1 0;
      min-height: 0;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 13px;
      line-height: 1.5;
      padding: 9px 11px;
      resize: none;
      outline: none;
      -webkit-app-region: no-drag;
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
    }

    textarea::placeholder { color: var(--text-hint); }

    textarea:focus {
      background: var(--input-bg-focus);
      border-color: var(--accent);
      box-shadow: 0 0 0 2.5px color-mix(in srgb, var(--accent) 20%, transparent);
    }

    /* ── Skeleton shimmer ── */
    @keyframes shimmer {
      0%   { background-position: -600px 0; }
      100% { background-position:  600px 0; }
    }

    .skeleton-wrap {
      flex: 1 1 0;
      min-height: 0;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 8px;
      padding: 14px 12px;
      display: none;
      flex-direction: column;
      gap: 11px;
    }

    .skeleton-wrap.visible { display: flex; }

    .skeleton-line {
      height: 13px;
      border-radius: 6px;
      background: linear-gradient(
        90deg,
        var(--shimmer-a)  0%,
        var(--shimmer-b) 50%,
        var(--shimmer-a) 100%
      );
      background-size: 600px 100%;
      animation: shimmer 1.6s ease-in-out infinite;
    }

    .skeleton-line:nth-child(2) { animation-delay: 0.15s; }
    .skeleton-line:nth-child(3) { animation-delay: 0.30s; }
    .skeleton-line:nth-child(4) { animation-delay: 0.45s; }

    :root {
      --shimmer-a: rgba(0, 0, 0, 0.06);
      --shimmer-b: rgba(0, 0, 0, 0.13);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --shimmer-a: rgba(255, 255, 255, 0.05);
        --shimmer-b: rgba(255, 255, 255, 0.13);
      }
    }

    /* ── Actions ── */
    .actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px 14px;
      flex-shrink: 0;
      -webkit-app-region: no-drag;
    }

    .hint {
      font-size: 10px;
      color: var(--text-hint);
      letter-spacing: 0.1px;
    }

    .btns {
      display: flex;
      gap: 7px;
    }

    button {
      font-family: inherit;
      font-size: 12.5px;
      font-weight: 500;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      padding: 6px 14px;
      transition: filter 0.1s;
      letter-spacing: -0.1px;
    }

    button:active { filter: brightness(0.88); }

    .btn-skip {
      background: var(--btn-secondary);
      color: var(--btn-secondary-text);
    }

    .btn-skip:hover { background: var(--btn-secondary-hover); }

    .btn-log {
      background: var(--accent);
      color: #fff;
    }

    .btn-log:hover { filter: brightness(1.08); }
  </style>
</head>
<body>
  <div class="header">
    <img src="../assets/icon.png" alt="icon" />
    <div class="header-text">
      <h1 id="question">What did you do in the last hour?</h1>
      <div class="subtitle" id="subtitle">Saved to your daily log.</div>
    </div>
    <button class="btn-settings" id="settings" title="Settings">
      <span class="btn-settings-icon">⚙︎</span>
    </button>
  </div>

  <div class="divider"></div>

  <div class="input-wrap">
    <div class="cmd-chip-row" id="cmd-chip-row">
      <span class="cmd-chip">/ask</span>
      <span class="cmd-chip-label">search mode — type your question</span>
      <button class="cmd-chip-x" id="cmd-chip-x" title="Cancel">✕</button>
    </div>
    <textarea
      id="input"
      placeholder="e.g. Fixed the auth bug, reviewed two PRs, synced with design..."
    ></textarea>
    <div class="skeleton-wrap" id="skeleton">
      <div class="skeleton-line" style="width: 82%"></div>
      <div class="skeleton-line" style="width: 55%"></div>
      <div class="skeleton-line" style="width: 71%"></div>
      <div class="skeleton-line" style="width: 38%"></div>
    </div>
    <div class="sigil-menu" id="sigil-menu">
      <div class="sigil-header">Commands</div>
      <div class="sigil-item" data-sigil="ask">
        <span class="sigil-name">/ask</span>
        <span class="sigil-desc">Search your logs with a question</span>
      </div>
      <div class="sigil-item" data-sigil="summary">
        <span class="sigil-name">/summary</span>
        <span class="sigil-desc">Summarize today · or /summary 3 for last 3 hours</span>
      </div>
    </div>
  </div>

  <div class="actions">
    <span class="hint">⌘↵ submit &nbsp;·&nbsp; Esc skip</span>
    <div class="btns">
      <button class="btn-skip" id="dismiss">Skip</button>
      <button class="btn-log"  id="submit">Log it</button>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
